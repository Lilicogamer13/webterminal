name: Rust

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Essencial para criar a release

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0 # Necessário para ler todas as tags anteriores

    - name: Build
      run: cargo build -r --verbose

    - name: Determine Next Version
      id: tag_version
      uses: mathieudutour/github-tag-action@v6.2
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        default_bump: patch # Incrementa o último número (0.1.0 -> 0.1.1)

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.tag_version.outputs.new_tag }}
        name: Release ${{ steps.tag_version.outputs.new_tag }}
        # Substitua 'NOME_DO_SEU_EXECUTAVEL' pelo nome real do binário no seu Cargo.toml
        files: target/release/webterminal
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
