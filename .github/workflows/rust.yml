name: Rust

on:
  push:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build
      run: cargo build -r --verbose

    - name: Get Next Version Number
      id: next_version
      shell: bash
      run: |
        LATEST_TAG=$(git tag -l "v*" --sort=-v:refname | head -n 1 | sed 's/v//' || echo "")
        if [ -z "$LATEST_TAG" ] || ! [[ "$LATEST_TAG" =~ ^[0-9]+$ ]]; then
          NEW_TAG=1
        else
          NEW_TAG=$((LATEST_TAG + 1))
        fi
        echo "tag=v$NEW_TAG" >> $GITHUB_OUTPUT

    - name: Create Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ${{ steps.next_version.outputs.tag }}
        name: Release ${{ steps.next_version.outputs.tag }}
        files: target/release/web_terminal
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
